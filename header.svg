<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bespoke → spokbee">
  <defs>
    <path id="bee-path"
          d="M 80,160 C 200,40 320,180 460,80 S 760,40 850,160 C 700,200 540,40 380,140 S 140,200 80,160"
          fill="none" stroke="none"/>

    <g id="bee">
      <!-- wings -->
      <ellipse cx="-3" cy="-12" rx="9" ry="5.5" fill="#E0F2FE" opacity="0.9" stroke="#1F2937" stroke-width="1.2">
        <animate attributeName="ry" values="5.5;1.5;5.5" dur="0.16s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="4" cy="-12" rx="9" ry="5.5" fill="#E0F2FE" opacity="0.9" stroke="#1F2937" stroke-width="1.2">
        <animate attributeName="ry" values="5.5;1.5;5.5" dur="0.16s" begin="0.08s" repeatCount="indefinite"/>
      </ellipse>
      <!-- body -->
      <ellipse cx="0" cy="0" rx="15" ry="11" fill="#FCD34D" stroke="#1F2937" stroke-width="1.6"/>
      <!-- stripes -->
      <ellipse cx="-5.5" cy="0" rx="2.2" ry="10" fill="#1F2937"/>
      <ellipse cx="5.5" cy="0" rx="2.2" ry="10" fill="#1F2937"/>
      <!-- head -->
      <circle cx="14" cy="0" r="6.5" fill="#FCD34D" stroke="#1F2937" stroke-width="1.6"/>
      <!-- antennae -->
      <path d="M 15 -5 q 2 -4 5 -5" stroke="#1F2937" stroke-width="1.3" fill="none"/>
      <circle cx="20.2" cy="-10.2" r="1.4" fill="#1F2937"/>
      <path d="M 18 -4 q 3 -3 6 -3" stroke="#1F2937" stroke-width="1.3" fill="none"/>
      <circle cx="24.2" cy="-7.2" r="1.4" fill="#1F2937"/>
      <!-- eye -->
      <circle cx="15.5" cy="-1" r="1.5" fill="#1F2937"/>
      <!-- stinger -->
      <path d="M -15 0 l -5 -2 l 0 4 z" fill="#1F2937"/>
    </g>

    <!--
      BESPOKE → SPOKBEE letter map:
        B  282 → 506
        E1 338 → 562
        S  394 → 282
        P  450 → 338
        O  506 → 394
        K  562 → 450
        E2 618 → 618 (stays)
      Animation timing (8s loop):
        0.000–0.125  hold BESPOKE
        0.125–0.500  rearrange
        0.500–0.875  hold SPOKBEE
        0.875–1.000  snap back
    -->
  </defs>

  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"
     font-size="74" font-weight="900" text-anchor="middle">

    <!-- B -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="282;282;506;506;282" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      <animate attributeName="fill" values="#A78BFA;#A78BFA;#FCD34D;#A78BFA;#A78BFA" keyTimes="0;0.45;0.55;0.7;1" dur="8s" repeatCount="indefinite"/>
      B
    </text>

    <!-- E1 -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="338;338;562;562;338" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      <animate attributeName="fill" values="#A78BFA;#A78BFA;#FCD34D;#A78BFA;#A78BFA" keyTimes="0;0.45;0.55;0.7;1" dur="8s" repeatCount="indefinite"/>
      E
    </text>

    <!-- S -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="394;394;282;282;394" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      S
    </text>

    <!-- P -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="450;450;338;338;450" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      P
    </text>

    <!-- O -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="506;506;394;394;506" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      O
    </text>

    <!-- K -->
    <text y="135" fill="#A78BFA">
      <animate attributeName="x" values="562;562;450;450;562" keyTimes="0;0.125;0.5;0.875;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 1 0 0 1"/>
      K
    </text>

    <!-- E2 (stays) -->
    <text x="618" y="135" fill="#A78BFA">
      <animate attributeName="fill" values="#A78BFA;#A78BFA;#FCD34D;#A78BFA;#A78BFA" keyTimes="0;0.45;0.55;0.7;1" dur="8s" repeatCount="indefinite"/>
      E
    </text>
  </g>

  <!-- twinkling sparkles -->
  <g font-size="22" font-family="serif">
    <text x="110" y="55" fill="#EC4899" opacity="0">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="800" y="70" fill="#A78BFA" opacity="0">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </text>
    <text x="180" y="195" fill="#FCD34D" opacity="0">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="720" y="200" fill="#EC4899" opacity="0">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="170" fill="#A78BFA" opacity="0" font-size="16">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    </text>
    <text x="850" y="170" fill="#FCD34D" opacity="0" font-size="16">✦
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- flying bee -->
  <use href="#bee">
    <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#bee-path"/>
    </animateMotion>
  </use>
</svg>
